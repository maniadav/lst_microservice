services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - whisper_models:/root/.cache/huggingface
      - ./tmp:/app/tmp
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    # healthcheck:
    #   test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 60s

volumes:
  whisper_models:

